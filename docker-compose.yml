services:
  kafka:
    image: apache/kafka:latest
    networks:
      - net
    env_file:
      - .env
    ports:
      - ${KAFKA_PORT_FORWARD}:${KAFKA_PORT_FORWARD}
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:29092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: 'Mk3OEYBSD34fcwNTJENDM2Qk'

  nginx:
    restart: always
    build: './nginx'
    networks:
      - net
    env_file:
      - .env
    ports:
      - ${NGINX_PORT}:${NGINX_PORT}
    depends_on:
      - cash-grab

  redis:
    image: redis:alpine
    restart: always
    networks:
      - net
    env_file:
      - .env
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}
    environment:
      - REDIS_ADDR=${REDIS_ADDR}
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  database:
    image: postgres:alpine
    restart: always
    networks:
      - net
    ports:
      - ${DB_CONNECTION_PORT}:${DB_CONNECTION_PORT}
    env_file:
      - .env
    environment:
      - PGUSER=${DB_CONNECTION_USER}
      - PGSSLMODE=disable
      - POSTGRES_PASSWORD=${DB_CONNECTION_PASSWORD}
      - POSTGRES_USER=${DB_CONNECTION_USER}
      - POSTGRES_DB=${DB_CONNECTION_DBNAME}
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready' ]
      interval: 10s
      timeout: 5s
      retries: 5

  cash-grab:
    build:
      context: .
      dockerfile: ./Dockerfile
    networks:
      - net
    ports:
      - ${PORT}:${PORT}
    env_file:
      - .env
    environment:
      - PORT=${PORT}
      - DB_CONNECTION_HOST=${DB_CONNECTION_HOST}
      - DB_CONNECTION_USER=${DB_CONNECTION_USER}
      - DB_CONNECTION_PASSWORD=${DB_CONNECTION_PASSWORD}
      - DB_CONNECTION_DBNAME=${DB_CONNECTION_DBNAME}
      - DB_CONNECTION_PORT=${DB_CONNECTION_PORT}
      - JWS_KEY=${JWS_KEY}
      - AWS_SECRET_ID=${AWS_SECRET_ID}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_BUCKET=${AWS_BUCKET}
      - REDIS_ADDR=${REDIS_ADDR}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAFKA_ORDER_TOPIC=${KAFKA_ORDER_TOPIC}
      - KAFKA_USER_TOPIC=${KAFKA_USER_TOPIC}
    depends_on:
      database:
        condition: service_healthy

networks:
  net:
    driver: bridge
